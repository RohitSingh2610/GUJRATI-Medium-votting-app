<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Voting Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> <!-- Added Material Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" role="main">
        <header>
            <div class="logo" aria-hidden="true" title="School Logo">
                <img src="Logo.png" alt="Gajera International School Logo" onerror="this.onerror=null;this.src='https://placehold.co/72x72/0f7c75/FFFFFF?text=G';">
            </div>
            <div class="school-info">
                <div class="school-name">Smt.S.H.Gajera Primary School, Utran</div>
                <div class="school-location">
                    <!-- <img src="Think Ask Rise.png" alt="Think Ask Rise" class="school-motto-img" onerror="this.onerror=null;this.src='https://placehold.co/150x24/CCCCCC/FFFFFF?text=Think+Ask+Rise';"> -->
                </div>
            </div>
        </header>

        <h1 class="title">Student Council Election 2026-27</h1>

        <!-- Homepage View -->
        <section id="home-view" class="view active" aria-label="Voting categories">
            <div class="button-grid" role="list">
                <button type="button" class="btn head-class" data-category="head-class">
                    <span class="material-icons" aria-hidden="true">school</span>Head Boy/Head Girl
                </button>
                <button type="button" class="btn green-house" data-category="green-house">
                    <span class="material-icons" aria-hidden="true">eco</span> Green House
                </button>
                <button type="button" class="btn yellow-house" data-category="yellow-house">
                    <span class="material-icons" aria-hidden="true">lightbulb</span> Yellow House
                </button>
                <button type="button" class="btn red-house" data-category="red-house">
                    <span class="material-icons" aria-hidden="true">local_fire_department</span> Red House
                </button>
                <button type="button" class="btn blue-house" data-category="blue-house">
                    <span class="material-icons" aria-hidden="true">water_drop</span> Blue House
                </button>
            </div>
            <div class="controls-container">
                <button id="show-results-btn" class="btn view-results" aria-label="View voting results">
                    <span class="material-icons" aria-hidden="true">poll</span> View Results
                </button>
                <button id="reset-btn" class="btn reset-votes" aria-label="Reset all votes">
                    <span class="material-icons" aria-hidden="true">restart_alt</span> Reset Votes
                </button>
            </div>
        </section>
        
        <!-- Gender Selection View -->
        <section id="gender-selection-view" class="view">
            <h2 id="gender-category-title"></h2>
            <div class="button-grid" id="gender-buttons">
                <button class="btn" data-gender="male"><span class="material-icons">male</span> Male</button>
                <button class="btn" data-gender="female"><span class="material-icons">female</span> Female</button>
            </div>
            <button class="btn back-btn" data-action="go-home">
                <span class="material-icons">arrow_back</span> Back to Home
            </button>
        </section>

        <!-- Candidate view -->
        <section id="candidate-view" class="view" aria-live="polite" aria-atomic="true">
            <h2 id="candidate-category-title"></h2>
            <div class="candidates-list" id="candidates-list"></div>
            <div class="info-message" id="info-message-candidate"></div>
            <button class="btn back-btn" data-action="go-to-gender-select">
                <span class="material-icons">arrow_back</span> Back to Gender Selection
            </button>
        </section>

        <!-- Results view -->
        <section id="results-view" class="view" aria-live="polite" aria-atomic="true" tabindex="-1">
            <h2>Voting Results</h2>
            <div class="results-list" id="results-list"></div>
            <button id="results-back-btn" class="btn back-btn">
                <span class="material-icons">arrow_back</span> Back to Home
            </button>
        </section>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modal-title">Enter Admin Password</h3>
            <input type="password" class="password-input" id="password-input" placeholder="Enter password">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="cancel-password">Cancel</button>
                <button class="modal-btn submit" id="submit-password">Submit</button>
            </div>
        </div>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
